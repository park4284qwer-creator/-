<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>익명 토론 게시판</title>

<style>
body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
margin:5px 0;
padding:5px;
}

button{
padding:5px 10px;
margin:3px;
}

.post{
border-bottom:1px solid #ccc;
padding:10px;
cursor:pointer;
}

.comment{
border-top:1px solid #ddd;
padding:5px;
}
</style>
</head>

<body>

<h1>익명 토론 게시판</h1>

<div id="main">

<h3>새 글 작성</h3>

<input id="title" placeholder="제목">
<input id="nickname" placeholder="닉네임">
<input id="password" type="password" placeholder="비밀번호">
<textarea id="content" maxlength="1000" placeholder="내용 (1000자 이하)"></textarea>

<button onclick="createPost()">작성</button>

<hr>

<div id="posts"></div>

</div>


<div id="postView" style="display:none">

<button onclick="back()">← 목록</button>

<h2 id="viewTitle"></h2>
<div id="viewContent"></div>

<br>

<input id="deletePassword" type="password" placeholder="비밀번호">
<button onclick="deletePost()">글 삭제</button>
<button onclick="adminDeletePost()">관리자 삭제</button>

<hr>

<h3>댓글</h3>

<div id="comments"></div>

<input id="commentNick" placeholder="닉네임">
<input id="commentPass" type="password" placeholder="비밀번호">
<textarea id="commentContent" maxlength="500" placeholder="댓글 (500자 이하)"></textarea>

<button onclick="createCommentPost()">댓글 작성</button>

</div>


<script>

const url="https://jzjjlbdyxzdhtedovkte.supabase.co"
const key="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6ampsYmR5eHpkaHRlZG92a3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTE5ODAsImV4cCI6MjA4OTg2Nzk4MH0.E5eSt1DTWWR0F30Up-gW3nRz3OMrzdSko2rEzkoEq9I"

const adminPassword="1231"

let currentPost=null
let lastWriteTime=0


// 공통 fetch
async function supabaseFetch(endpoint, options={}){

return fetch(url + endpoint, {
headers:{
apikey:key,
Authorization:"Bearer "+key,
"Content-Type":"application/json",
Prefer:"return=representation",
...options.headers
},
...options
})

}


// 게시글 목록
async function loadPosts(){

const res=await supabaseFetch("/rest/v1/posts?select=*")
const data=await res.json()

let html=""

;[...data].reverse().forEach(p=>{

html+=`
<div class="post" onclick="openPost(${p.id})">
<b>${p.title}</b><br>
${p.nickname}<br>
${(p.content || "").substring(0,100)}
</div>
`

})

document.getElementById("posts").innerHTML=html

}


// 글 작성
async function createPost(){

if(Date.now()-lastWriteTime<10000){
alert("10초 후 다시 작성 가능")
return
}

const title=document.getElementById("title").value
const nickname=document.getElementById("nickname").value
const password=document.getElementById("password").value
const content=document.getElementById("content").value

await supabaseFetch("/rest/v1/posts",{
method:"POST",
body:JSON.stringify({title,nickname,password,content})
})

lastWriteTime=Date.now()
location.reload()

}


// 글 열기
async function openPost(id){

currentPost=id

document.getElementById("main").style.display="none"
document.getElementById("postView").style.display="block"

const res=await supabaseFetch("/rest/v1/posts?id=eq."+id)
const data=await res.json()

if(!data.length){
alert("글 없음")
return
}

document.getElementById("viewTitle").innerText=data[0].title
document.getElementById("viewContent").innerText=data[0].content

loadComments()

}


// 글 삭제 (핵심 수정)
async function deletePost(){

let pass=document.getElementById("deletePassword").value

// 입력 안했으면 prompt
if(!pass){
pass = prompt("비밀번호 입력")
}

const res=await supabaseFetch("/rest/v1/posts?id=eq."+currentPost)
const data=await res.json()

const saved=(data[0]?.password || "").toString().trim()
const input=(pass || "").toString().trim()

console.log("입력:", input)
console.log("DB:", saved)

if(!data.length || saved !== input){
alert("비밀번호 틀림")
return
}

await supabaseFetch("/rest/v1/posts?id=eq."+currentPost,{
method:"DELETE"
})

alert("삭제 완료")
location.reload()

}


// 관리자 삭제
async function adminDeletePost(){

const pass=prompt("관리자 비밀번호")

if(pass!==adminPassword){
alert("관리자 비밀번호 틀림")
return
}

await supabaseFetch("/rest/v1/posts?id=eq."+currentPost,{
method:"DELETE"
})

alert("관리자 삭제 완료")
location.reload()

}


// 댓글 불러오기
async function loadComments(){

const res=await supabaseFetch("/rest/v1/comments?post_id=eq."+currentPost)
const data=await res.json()

let html=""

data.forEach(c=>{

html+=`
<div class="comment">
${c.nickname}: ${c.content}
<br>
<input id="cp${c.id}" type="password" placeholder="비밀번호">
<button onclick="deleteComment(${c.id})">삭제</button>
</div>
`

})

document.getElementById("comments").innerHTML=html

}


// 댓글 작성 (이름 충돌 해결)
async function createCommentPost(){

if(Date.now()-lastWriteTime<10000){
alert("10초 후 다시 작성 가능")
return
}

const nickname=document.getElementById("commentNick").value
const password=document.getElementById("commentPass").value
const content=document.getElementById("commentContent").value

await supabaseFetch("/rest/v1/comments",{
method:"POST",
body:JSON.stringify({
post_id:currentPost,
nickname,
password,
content
})
})

lastWriteTime=Date.now()

document.getElementById("commentNick").value=""
document.getElementById("commentPass").value=""
document.getElementById("commentContent").value=""

loadComments()

}


// 댓글 삭제 (비밀번호 비교 수정)
async function deleteComment(id){

const inputRaw=document.getElementById("cp"+id).value

const res=await supabaseFetch("/rest/v1/comments?id=eq."+id)
const data=await res.json()

const saved=(data[0]?.password || "").toString().trim()
const input=(inputRaw || "").toString().trim()

if(!data.length || saved !== input){
alert("비밀번호 틀림")
return
}

await supabaseFetch("/rest/v1/comments?id=eq."+id,{
method:"DELETE"
})

loadComments()

}


// 뒤로가기
function back(){

document.getElementById("main").style.display="block"
document.getElementById("postView").style.display="none"

}


loadPosts()

</script>

</body>
</html>
